  `з®—е‘Ҫзҡ„иҜҙжҲ‘жҳҺе№ҙдјҡеҘҪпјҢеҺ»е№ҙд№ҹжҳҜиҝҷд№ҲиҜҙзҡ„`,
];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const MOODS = ['еҫ®ж “', 'е°Ҹж “', 'дёӯж “', 'еӨ§ж “', 'и¶…зә§ж “', 'ж “йә»дәҶ'];

function Counter({ count }) {
  const [display, setDisplay] = React.useState(count);
  const [glitching, setGlitching] = React.useState(false);
  const [moodIdx, setMoodIdx] = React.useState(3);

  React.useEffect(() => {
    const interval = setInterval(() => {
      const inc = Math.floor(Math.random() * 5) + 1;
      setDisplay(prev => prev + inc);
      setGlitching(true);
      setTimeout(() => setGlitching(false), 300);
      if (Math.random() > 0.7) {
        setMoodIdx(Math.min(MOODS.length - 1, Math.floor(Math.random() * MOODS.length)));
      }
    }, 2500 + Math.random() * 2000);
    return () => clearInterval(interval);
  }, []);

  return (
    <div className="header">
      <div className="wordmark">SHUANQ.TOP</div>
      <div className="counter-wrap">
        <span className="counter-label">е·Іжңү</span>
        <span className={`counter-number ${glitching ? 'glitch' : ''}`}>
          {display.toLocaleString()}
        </span>
        <span className="counter-unit">дәәж “Q</span>
      </div>
      {TWEAK_DEFAULTS.showMoodBar && (
        <div className="mood-bar">
          <span>д»Ҡж—Ҙж “QжҢҮж•°</span>
          <span className="mood-level">{MOODS[moodIdx]}</span>
        </div>
      )}
    </div>
  );
}

function DanmakuRow({ quotes, rowIndex, speed }) {
  const isReverse = rowIndex % 2 === 1;
  const baseDuration = 35 + rowIndex * 4;
  const duration = baseDuration / speed;

  const doubled = [...quotes, ...quotes];

  const getItemClass = (i) => {
    const classes = ['danmaku-item'];
    const sizeRand = (rowIndex * 7 + i) % 10;
    if (sizeRand < 2) classes.push('size-lg');
    else if (sizeRand > 7) classes.push('size-sm');

    const colorRand = (rowIndex * 3 + i) % 12;
    if (colorRand === 0) classes.push('highlight');
    else if (colorRand === 3) classes.push('green');
    else if (colorRand === 7) classes.push('pink');

    if ((rowIndex + i) % 9 === 0) classes.push('glow');

    return classes.join(' ');
  };

  return (
    <div
      className={`danmaku-row ${isReverse ? 'reverse' : ''}`}
      style={{
        top: `${rowIndex * 52}px`,
        animationDuration: `${duration}s`,
      }}
    >
      {doubled.map((q, i) => (
        <div key={`${rowIndex}-${i}`} className={getItemClass(i)} data-quote={q}>
          <span>{q}</span>
          <span className="shuanq-tag">ж “Q</span>
        </div>
      ))}
    </div>
  );
}

function DanmakuArea({ onQuoteClick }) {
  const rows = React.useMemo(() => {
    const numRows = TWEAK_DEFAULTS.danmakuRows;
    const result = [];
    const shuffled = shuffle(QUOTES);
    const perRow = Math.ceil(shuffled.length / numRows);
    for (let i = 0; i < numRows; i++) {
      const start = (i * 7) % shuffled.length;
      const rowQuotes = [];
      for (let j = 0; j < perRow; j++) {
        rowQuotes.push(shuffled[(start + j) % shuffled.length]);
      }
      result.push(rowQuotes);
    }
    return result;
  }, []);

  const handleClick = (e) => {
    const item = e.target.closest('.danmaku-item');
    if (item) {
      onQuoteClick(item.dataset.quote);
    }
  };

  return (
    <div className="danmaku-area" onClick={handleClick}>
      <div className="danmaku-fade-top" />
      <div className="danmaku-fade-bottom" />
      {rows.map((quotes, i) => (
        <DanmakuRow key={i} quotes={quotes} rowIndex={i} speed={TWEAK_DEFAULTS.scrollSpeed} />
      ))}
    </div>
  );
}

function Confetti({ active }) {
  if (!active) return null;
  const colors = ['#f5e642', '#42f5a7', '#f54275', '#42a5f5', '#f5a742'];
  const pieces = Array.from({ length: 30 }, (_, i) => ({
    id: i,
    left: Math.random() * 100,
    color: colors[i % colors.length],
    delay: Math.random() * 0.5,
    size: 4 + Math.random() * 8,
  }));

  return (
    <div className="confetti">
      {pieces.map(p => (
        <div
          key={p.id}
          className="confetti-piece"
          style={{
            left: `${p.left}%`,
            backgroundColor: p.color,
            animationDelay: `${p.delay}s`,
            width: `${p.size}px`,
            height: `${p.size}px`,
            opacity: 1,
          }}
        />
      ))}
    </div>
  );
}

function ExpandOverlay({ quote, onClose }) {
  return (
    <div className={`expand-overlay ${quote ? 'show' : ''}`} onClick={onClose}>
      <div className="expand-card" onClick={e => e.stopPropagation()}>
        <div className="quote-text">{quote}</div>
        <div className="shuanq-big">ж “Q</div>
      </div>
    </div>
  );
}

function InputBar({ onSubmit }) {
  const [value, setValue] = React.useState('');
  const [submitting, setSubmitting] = React.useState(false);

  const handleSubmit = () => {
    if (!value.trim() || submitting) return;
    setSubmitting(true);
    onSubmit(value.trim());
    setValue('');
    setTimeout(() => setSubmitting(false), 1500);
  };

  return (
    <div className="input-bar">
      <input
        className="input-field"
        placeholder="иҜҙиҜҙдҪ зҡ„ж “Qзһ¬й—ҙ..."
        value={value}
        onChange={e => setValue(e.target.value)}
        onKeyDown={e => e.key === 'Enter' && handleSubmit()}
        maxLength={80}
      />
      <button
        className="submit-btn"
        onClick={handleSubmit}
        disabled={!value.trim() || submitting}
        aria-label="жҸҗдәӨ"
      >
        ж “
      </button>
    </div>
  );
}

function App() {
  const [toastVisible, setToastVisible] = React.useState(false);
  const [confettiActive, setConfettiActive] = React.useState(false);
  const [shaking, setShaking] = React.useState(false);
  const [expandedQuote, setExpandedQuote] = React.useState(null);

  const handleSubmit = () => {
    setShaking(true);
    setConfettiActive(true);
    setToastVisible(true);
    setTimeout(() => setShaking(false), 400);
    setTimeout(() => setToastVisible(false), 2000);
    setTimeout(() => setConfettiActive(false), 2000);
  };

  return (
    <div className={shaking ? 'shake' : ''} style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
      <Counter count={12847} />
      <DanmakuArea onQuoteClick={setExpandedQuote} />
      <InputBar onSubmit={handleSubmit} />
      <div className={`toast ${toastVisible ? 'show' : ''}`}>
        ж “QжҲҗеҠҹпјҒе·ІеҠ е…Ҙеҗҗж§Ҫеўҷ
      </div>
      <Confetti active={confettiActive} />
      <ExpandOverlay quote={expandedQuote} onClose={() => setExpandedQuote(null)} />
      <div className="watermark">shuanq.top</div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('app'));
root.render(<App />);
